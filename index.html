<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <title>Accion City v1.2</title>
  <link rel="stylesheet" href="./style.css?v=1.3" />
</head>

<body>
  <div id="app"></div>
  <div id="loading">
    <div style="background: rgba(0,0,0,0.7); padding: 30px; border-radius: 15px; text-align: center; box-shadow: 0 0 20px rgba(0,0,0,0.8);">
      <h1 style="color: #ffaa00; margin-bottom: 20px; font-family: 'Arial Black', sans-serif; text-transform: uppercase;">AccionCity</h1>
      <button id="start-game-btn" onclick="console.log('Button clicked!'); if(typeof window.startGame === 'function') window.startGame(); else alert('El juego aún se está inicializando, por favor espera un segundo y vuelve a intentar.');" style="padding: 15px 30px; font-size: 20px; font-weight: bold; background: #00ffaa; color: #000; border: none; cursor: pointer; border-radius: 5px; box-shadow: 0 0 15px #00ffaa;">ENTRAR A LA ZONA DE GUERRA</button>
      <p id="loading-text" style="margin-top: 15px; color: white; display: none; font-family: monospace;">Cargando Zona de Guerra...</p>
    </div>
  </div>
  <div id="debug-console"
    style="position: absolute; top: 0; left: 0; color: lime; background: rgba(0,0,0,0.5); pointer-events: none; z-index: 9999; font-family: monospace; font-size: 10px; white-space: pre;">
    Debug Info...</div>
  <div id="crosshair" style="display: none;">+</div>
  
  <div id="heli-radar" style="display: none;">
    <div class="radar-center-box">
      <div id="radar-compass-ring">
        <div class="compass-deg" style="transform: rotate(0deg) translateY(-40vh)">N</div>
        <div class="compass-deg" style="transform: rotate(30deg) translateY(-40vh)">30</div>
        <div class="compass-deg" style="transform: rotate(60deg) translateY(-40vh)">60</div>
        <div class="compass-deg" style="transform: rotate(90deg) translateY(-40vh)">E</div>
        <div class="compass-deg" style="transform: rotate(120deg) translateY(-40vh)">120</div>
        <div class="compass-deg" style="transform: rotate(150deg) translateY(-40vh)">150</div>
        <div class="compass-deg" style="transform: rotate(180deg) translateY(-40vh)">S</div>
        <div class="compass-deg" style="transform: rotate(210deg) translateY(-40vh)">210</div>
        <div class="compass-deg" style="transform: rotate(240deg) translateY(-40vh)">240</div>
        <div class="compass-deg" style="transform: rotate(270deg) translateY(-40vh)">W</div>
        <div class="compass-deg" style="transform: rotate(300deg) translateY(-40vh)">300</div>
        <div class="compass-deg" style="transform: rotate(330deg) translateY(-40vh)">330</div>
      </div>
      <div class="radar-rings">
        <div class="ring r1"></div>
        <div class="ring r2"></div>
        <div class="ring r3"></div>
        <div class="radar-crosshair-lines"></div>
      </div>
      <div class="radar-sweep"></div>
      <div id="radar-blips"></div>
    </div>
    <div id="hud-altimeter">
      <div class="alt-label">ALT</div>
      <div class="alt-readout">0000</div>
      <div class="alt-scale">
        <div id="alt-tape"></div>
      </div>
    </div>
    <div id="hud-attitude">
      <div id="attitude-pitch">
        <div class="pitch-line pl-1">---  10  ---</div>
        <div class="pitch-line pl-0">==========</div>
        <div class="pitch-line pl--1">--- -10  ---</div>
      </div>
      <div class="attitude-cross">
        <div class="hud-center-dot"></div>
        <div class="hud-wing left-wing"></div>
        <div class="hud-wing right-wing"></div>
      </div>
    </div>
  </div>

  <div id="mobile-controls">
    <div id="zone_joystick"></div>
    <div id="psp-controls">
      <div id="btn-l" class="psp-btn shoulder-btn">L</div>
      <div id="btn-r" class="psp-btn shoulder-btn">R</div>
      <div id="dpad-container">
        <div id="btn-up" class="psp-btn dpad-btn">▲</div>
        <div id="btn-down" class="psp-btn dpad-btn">▼</div>
        <div id="btn-left" class="psp-btn dpad-btn">◄</div>
        <div id="btn-right" class="psp-btn dpad-btn">►</div>
        <div id="dpad-center"></div>
      </div>
      <div id="shapes-container">
        <div id="btn-tri" class="psp-btn shape-btn">△</div>
        <div id="btn-cir" class="psp-btn shape-btn">○</div>
        <div id="btn-x" class="psp-btn shape-btn">✕</div>
        <div id="btn-sq" class="psp-btn shape-btn">□</div>
      </div>
      <div id="camera-cross-container">
        <div id="btn-cam-up" class="psp-btn dpad-btn">▲</div>
        <div id="btn-cam-down" class="psp-btn dpad-btn">▼</div>
        <div id="btn-cam-left" class="psp-btn dpad-btn">◀</div>
        <div id="btn-cam-right" class="psp-btn dpad-btn">▶</div>
        <div id="camera-center"></div>
      </div>
      <div id="center-bar">
        <div id="btn-select" class="psp-btn center-btn">SELECT</div>
        <div id="btn-start" class="psp-btn center-btn">START</div>
      </div>
      <div id="toggles-container">
        <div id="btn-chat-toggle" class="psp-btn toggle-btn">💬</div>
        <div id="btn-map-toggle" class="psp-btn toggle-btn">🗺️</div>
      </div>
    </div>
    <div id="zone_right" class="zone"></div>
    <div id="chat-container" style="display: none;">
      <div id="chat-messages"></div>
      <input type="text" id="chat-input" placeholder="Type..." autocomplete="off">
    </div>
  </div>

  <script type="module">
    import './main.js?v=1.3';
  </script>
</body>
</html>
