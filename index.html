<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D City Explorer</title>
  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <div id="app"></div>
  <div id="loading">Loading...</div>

  <!-- Controls Interface -->
  <div id="ui-layer">
    <div id="btn-fwd" class="mobile-btn">⬆</div>
    <div id="btn-back" class="mobile-btn">⬇</div>
    <div id="btn-zoom" class="mobile-btn">🎯</div>

    <div id="zone_joystick">
      <!-- Left zone removed -->
      <div id="zone_right" class="zone"></div>
    </div>

    <!-- Chat UI -->
    <div id="chat-container">
      <div id="chat-messages"></div>
      <input type="text" id="chat-input" placeholder="Press enter to chat..." autocomplete="off">
    </div>
  </div>

  <script type="module" src="./main.js"></script>
</body>

</html>
