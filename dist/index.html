<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <title>3D City Explorer</title>
  
  <script type="module" crossorigin src="/assets/index-30b5fddc.js"></script>
  <link rel="stylesheet" href="/assets/index-0e4fab81.css">
</head>

<body>
  <div id="app"></div>
  <div id="loading">Loading City...</div>
  <div id="debug-console"
    style="position: absolute; top: 0; left: 0; color: lime; background: rgba(0,0,0,0.5); pointer-events: none; z-index: 9999; font-family: monospace; font-size: 10px; white-space: pre;">
    Debug Info...</div>
  <div id="crosshair" style="display: none;">+</div>
  <div id="mobile-controls"> Interface -->
    <div id="zone_joystick"></div> <!-- Left Joystick (Still NippleJS for Analog?) User asked for Cross/D-Pad -->
    <!-- Actually, user said "necesito 2 cruces", implies D-Pad buttons. Let's make D-Pad buttons AND keep joystick invisible/underneath? -->
    <!-- Let's build the visual D-Pad -->

    <div id="psp-controls">
      <!-- SHOULDER BUTTONS -->
      <div id="btn-l" class="psp-btn shoulder-btn">L</div>
      <div id="btn-r" class="psp-btn shoulder-btn">R</div>

      <!-- LEFT D-PAD -->
      <div id="dpad-container">
        <div id="btn-up" class="psp-btn dpad-btn">▲</div>
        <div id="btn-down" class="psp-btn dpad-btn">▼</div>
        <div id="btn-left" class="psp-btn dpad-btn">◄</div>
        <div id="btn-right" class="psp-btn dpad-btn">►</div>
        <div id="dpad-center"></div>
      </div>

      <!-- RIGHT SHAPES -->
      <div id="shapes-container">
        <div id="btn-tri" class="psp-btn shape-btn">△</div> <!-- Switch -->
        <div id="btn-cir" class="psp-btn shape-btn">○</div> <!-- Ghost/Laser? -->
        <div id="btn-x" class="psp-btn shape-btn">✕</div> <!-- Jump -->
        <div id="btn-sq" class="psp-btn shape-btn">□</div> <!-- Run? -->
      </div>

      <!-- RIGHT CAMERA CROSS (New Request) -->
      <div id="camera-cross-container">
        <div id="btn-cam-up" class="psp-btn dpad-btn">▲</div>
        <div id="btn-cam-down" class="psp-btn dpad-btn">▼</div>
        <div id="btn-cam-left" class="psp-btn dpad-btn">◀</div>
        <div id="btn-cam-right" class="psp-btn dpad-btn">▶</div>
        <div id="camera-center"></div>
      </div>

      <!-- CENTER BAR -->
      <div id="center-bar">
        <div id="btn-select" class="psp-btn center-btn">SELECT</div>
        <div id="btn-start" class="psp-btn center-btn">START</div>
      </div>

      <!-- EXTRA TOGGLES (On screen edges) -->
      <div id="toggles-container">
        <div id="btn-chat-toggle" class="psp-btn toggle-btn">💬</div>
        <div id="btn-map-toggle" class="psp-btn toggle-btn">🗺️</div>
      </div>
    </div>

    <div id="zone_right" class="zone"></div> <!-- Right Look Zone (Background) -->

    <!-- Chat UI (Hidden by default?) -->
    <div id="chat-container" style="display: none;">
      <div id="chat-messages"></div>
      <input type="text" id="chat-input" placeholder="Type..." autocomplete="off">
    </div>
  </div>

  
</body>

</html>
