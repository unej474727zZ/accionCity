<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal 3D Inspector PRO</title>
    <style>
        :root {
            --bg-main: #0b0c10;
            --bg-panel: #14171c;
            --text-main: #c5c6c7;
            --accent: #66fcf1;
            --accent-hover: #45a29e;
            --border-color: #2b2e33;
            --item-hover: #1e232b;
            --item-selected: #1c3d4a;
        }

        body {
            margin: 0;
            display: flex;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            overflow: hidden;
        }

        .panel {
            padding: 20px;
            box-sizing: border-box;
            overflow-y: auto;
            background-color: var(--bg-panel);
            display: flex;
            flex-direction: column;
        }

        #left-panel {
            width: 350px;
            min-width: 280px;
            max-width: 600px;
            border-right: 1px solid var(--border-color);
        }

        #center-panel {
            flex-grow: 1;
            position: relative;
            min-width: 300px;
            background: radial-gradient(circle, #1b2029 0%, #0b0c10 100%);
        }

        #right-panel {
            width: 350px;
            min-width: 280px;
            max-width: 600px;
            border-left: 1px solid var(--border-color);
        }

        .resizer {
            width: 4px;
            background-color: var(--border-color);
            cursor: col-resize;
            z-index: 5;
            transition: background 0.2s;
        }

        .resizer:hover,
        .resizer.active {
            background-color: var(--accent);
            box-shadow: 0 0 8px var(--accent);
        }

        h2 {
            font-size: 1.1rem;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 8px;
            margin: 0 0 15px 0;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 800;
        }

        input[type="file"],
        input[type="text"] {
            width: 100%;
            margin-bottom: 10px;
            background: #1a1e24;
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 10px;
            border-radius: 4px;
            box-sizing: border-box;
            outline: none;
            transition: border 0.2s;
        }

        input[type="text"]:focus {
            border-color: var(--accent);
        }

        .btn-group {
            display: flex;
            gap: 5px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        button {
            flex: 1;
            padding: 10px 5px;
            background: #1a1e24;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            cursor: pointer;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 700;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        button:hover:not(:disabled) {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--item-hover);
        }

        button.active {
            background: var(--item-selected);
            border-color: var(--accent);
            color: var(--accent);
        }

        #tree-container {
            flex-grow: 1;
            overflow-y: auto;
            font-family: 'Consolas', monospace;
            font-size: 0.85rem;
            border: 1px solid #222;
            padding: 5px;
            background: #0c0e12;
        }

        ul {
            list-style-type: none;
            padding-left: 15px;
            margin: 2px 0;
            border-left: 1px solid #2a2e35;
        }

        .root-ul {
            padding-left: 0;
            border-left: none;
        }

        li {
            margin: 2px 0;
        }

        li.hidden {
            display: none;
        }

        .toggle-btn {
            cursor: pointer;
            display: inline-block;
            width: 15px;
            color: var(--accent);
            font-weight: bold;
            margin-right: 2px;
        }

        .node-name {
            cursor: pointer;
            padding: 2px 5px;
            border-radius: 3px;
            display: inline-block;
            transition: background 0.1s;
            color: #aaa;
        }

        .node-name:hover {
            background: var(--item-hover);
            color: #fff;
        }

        .node-name.selected {
            background: var(--item-selected);
            color: var(--accent) !important;
            border-left: 2px solid var(--accent);
        }

        .type-mesh {
            color: #8ee4af;
        }

        .type-bone {
            color: #f3e5ab;
        }

        .type-group {
            color: #5bc0be;
        }

        textarea {
            flex-grow: 1;
            width: 100%;
            background: #0b0c10;
            color: #8ee4af;
            border: 1px solid var(--border-color);
            padding: 12px;
            font-family: 'Consolas', monospace;
            resize: none;
            font-size: 0.85rem;
            border-radius: 4px;
            box-sizing: border-box;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.5);
        }

        #loading {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(11, 12, 16, 0.9);
            color: var(--accent);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10;
            backdrop-filter: blur(8px);
            font-weight: bold;
            font-size: 1.2rem;
            flex-direction: column;
            gap: 15px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(102, 252, 241, 0.1);
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .hint {
            font-size: 0.7rem;
            color: #555;
            margin-top: 10px;
            font-style: italic;
            text-align: center;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-thumb {
            background: #3a3d41;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }
    </style>
</head>

<body>
    <div id="left-panel" class="panel">
        <h2>3D Inspector: Tools</h2>
        <p style="font-size: 0.7rem; color: #888; margin-top:-10px; margin-bottom:15px;">Inspector 3D Standalone v2.0
        </p>

        <input type="file" id="file-input" accept=".glb,.gltf">

        <div class="btn-group">
            <button id="btn-expand">Expandir</button>
            <button id="btn-collapse">Contraer</button>
            <button id="btn-skeleton">Huesos: OFF</button>
        </div>

        <div class="btn-group">
            <button id="btn-mode-translate">Mover</button>
            <button id="btn-mode-rotate" class="active">Rotar</button>
            <button id="btn-mode-scale">Escalar</button>
        </div>

        <h2 style="margin-top: 20px;">Jerarquía</h2>
        <input type="text" id="tree-search" placeholder="Buscar hueso o malla...">
        <div id="tree-container">Selecciona un modelo .glb...</div>
        <p class="hint">Shift + Click: Pan | Rueda: Zoom | Click: Seleccionar</p>
    </div>

    <div class="resizer" id="resizer-left"></div>

    <div id="center-panel">
        <div id="loading">
            <div class="spinner"></div>
            <div id="loading-text">CARGANDO MOTOR 3D...</div>
        </div>
    </div>

    <div class="resizer" id="resizer-right"></div>

    <div id="right-panel" class="panel">
        <h2>Datos para la IA</h2>
        <textarea id="ai-output" readonly spellcheck="false">Esperando selección...</textarea>
        <p class="hint">Los datos se actualizan en vivo al usar los controles en el visor.</p>
    </div>

    <!-- Scripts con carga ultra-robusta (Cloudflare es mas estable en redes restringidas) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/TransformControls.js"></script>

    <script>
        let scene, camera, renderer, controls, transformControls;
        let currentModel = null;
        let boxHelper = null;
        let skeletonHelper = null;
        let nodeMap = {};
        let selectedUUID = null;

        // Iniciar al cargar todo
        window.onload = init;

        function init() {
            if (typeof THREE === 'undefined') {
                document.getElementById('loading-text').textContent = "ERROR: No se pudo cargar Three.js. Revisa tu conexión.";
                return;
            }

            const container = document.getElementById('center-panel');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0b0c10);

            camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.set(3, 3, 6);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.outputEncoding = THREE.sRGBEncoding;
            container.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            transformControls = new THREE.TransformControls(camera, renderer.domElement);
            transformControls.addEventListener('change', () => {
                if (transformControls.object) updateAIData(transformControls.object.uuid);
            });
            transformControls.addEventListener('dragging-changed', (event) => {
                controls.enabled = !event.value;
            });
            scene.add(transformControls);

            scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1.2));
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(5, 10, 7);
            scene.add(dirLight);

            scene.add(new THREE.GridHelper(20, 20, 0x444444, 0x222222));

            boxHelper = new THREE.BoxHelper();
            boxHelper.material.color.setHex(0x66fcf1);
            boxHelper.visible = false;
            scene.add(boxHelper);

            // UI Events
            window.addEventListener('resize', onWindowResize);
            document.getElementById('file-input').addEventListener('change', handleFileUpload);
            document.getElementById('btn-expand').addEventListener('click', () => toggleAll(true));
            document.getElementById('btn-collapse').addEventListener('click', () => toggleAll(false));
            document.getElementById('btn-skeleton').addEventListener('click', toggleSkeleton);
            document.getElementById('tree-search').addEventListener('input', handleSearch);
            document.getElementById('btn-mode-translate').addEventListener('click', () => setTransformMode('translate'));
            document.getElementById('btn-mode-rotate').addEventListener('click', () => setTransformMode('rotate'));
            document.getElementById('btn-mode-scale').addEventListener('click', () => setTransformMode('scale'));

            renderer.domElement.addEventListener('pointerdown', onPointerDown);

            // Auto-load from URL if present
            const params = new URLSearchParams(window.location.search);
            if (params.has('model')) {
                loadModelFromUrl(params.get('model'), params.get('select'));
            }

            initResizers();
            animate();
        }

        function setTransformMode(mode) {
            transformControls.setMode(mode);
            document.querySelectorAll('.btn-group button').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-mode-${mode}`).classList.add('active');
        }

        function toggleSkeleton() {
            if (!currentModel) return;
            const btn = document.getElementById('btn-skeleton');
            if (skeletonHelper) {
                scene.remove(skeletonHelper);
                skeletonHelper = null;
                btn.textContent = "Huesos: OFF";
                btn.classList.remove('active');
            } else {
                skeletonHelper = new THREE.SkeletonHelper(currentModel);
                scene.add(skeletonHelper);
                btn.textContent = "Huesos: ON";
                btn.classList.add('active');
            }
        }

        function handleSearch(e) {
            const query = e.target.value.toLowerCase();
            document.querySelectorAll('.node-name').forEach(n => {
                const li = n.closest('li');
                if (n.textContent.toLowerCase().includes(query)) {
                    li.classList.remove('hidden');
                    let p = li.parentElement.closest('li');
                    while (p) { p.classList.remove('hidden'); const ul = p.querySelector('ul'); if (ul) ul.style.display = 'block'; p = p.parentElement.closest('li'); }
                } else { li.classList.add('hidden'); }
            });
            if (!query) toggleAll(true);
        }

        function onWindowResize() {
            const c = document.getElementById('center-panel');
            camera.aspect = c.clientWidth / c.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(c.clientWidth, c.clientHeight);
        }

        function onPointerDown(event) {
            if (!currentModel || transformControls.dragging) return;
            const rect = renderer.domElement.getBoundingClientRect();
            const rayMouse = new THREE.Vector2(
                ((event.clientX - rect.left) / rect.width) * 2 - 1,
                -((event.clientY - rect.top) / rect.height) * 2 + 1
            );
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(rayMouse, camera);
            const hits = raycaster.intersectObjects(currentModel.children, true);
            if (hits.length > 0) selectNode(hits[0].object.uuid);
        }

        function loadModelFromUrl(url, selectName) {
            document.getElementById('loading').style.display = 'flex';
            new THREE.GLTFLoader().load(url, (gltf) => processLoadedGLTF(gltf, selectName), null, () => {
                document.getElementById('loading').style.display = 'none';
            });
        }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            document.getElementById('loading').style.display = 'flex';
            document.getElementById('loading-text').textContent = "CARGANDO ARCHIVO...";
            new THREE.GLTFLoader().load(URL.createObjectURL(file), (gltf) => processLoadedGLTF(gltf, null));
        }

        function processLoadedGLTF(gltf, selectName) {
            if (currentModel) scene.remove(currentModel);
            currentModel = gltf.scene;
            scene.add(currentModel);
            nodeMap = {};
            document.getElementById('tree-container').innerHTML = `<ul class="root-ul">${buildTreeHTML(currentModel, null)}</ul>`;
            bindTreeEvents();
            document.getElementById('loading').style.display = 'none';
            if (selectName) {
                const target = Object.values(nodeMap).find(n => n.name === selectName);
                if (target) selectNode(target.node.uuid);
            }
        }

        function buildTreeHTML(node, parentUUID) {
            const type = node.isBone ? "Bone" : (node.isMesh ? "Mesh" : (node.type === "Group" ? "Group" : "Obj3D"));
            const uuid = node.uuid;
            const name = node.name || "Sin nombre";
            nodeMap[uuid] = { node, type, name, parentUUID };
            const hasChildren = node.children && node.children.length > 0;
            let html = `<li>
                ${hasChildren ? `<span class="toggle-btn" data-target="ul-${uuid}">[-]</span>` : `<span class="toggle-btn"></span>`}
                <span class="node-name type-${type.toLowerCase()}" data-uuid="${uuid}">[${type}] ${name}</span>`;
            if (hasChildren) {
                html += `<ul id="ul-${uuid}">`;
                for (let child of node.children) html += buildTreeHTML(child, uuid);
                html += `</ul>`;
            }
            return html + `</li>`;
        }

        function bindTreeEvents() {
            document.querySelectorAll('.toggle-btn[data-target]').forEach(t => {
                t.onclick = (e) => {
                    const ul = document.getElementById(e.target.dataset.target);
                    const hidden = ul.style.display === 'none';
                    ul.style.display = hidden ? 'block' : 'none';
                    e.target.textContent = hidden ? '[-]' : '[+]';
                };
            });
            document.querySelectorAll('.node-name').forEach(n => {
                n.onclick = (e) => selectNode(e.currentTarget.dataset.uuid);
            });
        }

        function toggleAll(expand) {
            document.querySelectorAll('#tree-container ul:not(.root-ul)').forEach(ul => ul.style.display = expand ? 'block' : 'none');
            document.querySelectorAll('.toggle-btn[data-target]').forEach(t => t.textContent = expand ? '[-]' : '[+]');
        }

        function selectNode(uuid) {
            const data = nodeMap[uuid];
            if (!data) return;
            if (selectedUUID) {
                const old = document.querySelector(`.node-name[data-uuid="${selectedUUID}"]`);
                if (old) old.classList.remove('selected');
            }
            selectedUUID = uuid;
            const el = document.querySelector(`.node-name[data-uuid="${uuid}"]`);
            if (el) {
                el.classList.add('selected');
                el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
            const obj = data.node;
            boxHelper.setFromObject(obj);
            boxHelper.visible = true;
            transformControls.attach(obj);
            updateAIData(uuid);
        }

        function updateAIData(uuid) {
            const data = nodeMap[uuid];
            const o = data.node;
            const p = o.position, r = o.rotation, s = o.scale;
            let text = `OBJETO: ${data.name}\n\n`;
            text += `POSICIÓN : [${p.x.toFixed(4)}, ${p.y.toFixed(4)}, ${p.z.toFixed(4)}]\n`;
            text += `ROTACIÓN  : [${(r.x * 180 / Math.PI).toFixed(2)}°, ${(r.y * 180 / Math.PI).toFixed(2)}°, ${(r.z * 180 / Math.PI).toFixed(2)}°]\n`;
            text += `ESCALA    : [${s.x.toFixed(4)}, ${s.y.toFixed(4)}, ${s.z.toFixed(4)}]\n`;
            document.getElementById('ai-output').value = text;
        }

        function animate() {
            requestAnimationFrame(animate);
            if (controls) controls.update();
            if (renderer) renderer.render(scene, camera);
        }

        function initResizers() {
            const rL = document.getElementById('resizer-left'), rR = document.getElementById('resizer-right');
            const pL = document.getElementById('left-panel'), pR = document.getElementById('right-panel');
            let res = null;
            rL.onmousedown = () => res = 'L'; rR.onmousedown = () => res = 'R';
            window.onmousemove = (e) => {
                if (res === 'L') pL.style.width = e.clientX + 'px';
                if (res === 'R') pR.style.width = (window.innerWidth - e.clientX) + 'px';
                onWindowResize();
            };
            window.onmouseup = () => res = null;
        }
    </script>
</body>

</html>
